<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>kofi Honu Gallery.com — Sign Up</title>
		<script src="https://cdn.tailwindcss.com"></script>
		<link rel="stylesheet" href="style.css">
	</head>
	<body class="min-h-screen bg-cover bg-center" style="background-image: url('The Story Painter/index-bg.jpg');">
		<div class="absolute inset-0 bg-deepPurple/75 backdrop-blur-sm"></div>
		<main class="relative z-10 flex items-center justify-center min-h-screen px-4">
			<div class="w-full max-w-md bg-cream/90 rounded-xl shadow-xl p-8">
<h1 class="text-3xl font-bold text-deepPurple mb-2">kofi Honu Gallery.com</h1>
				<p class="text-sm text-deepPurple/80 mb-6">Create an account to explore paintings that speak.</p>

				<form id="signupForm" class="space-y-4">
					<div>
						<label class="block text-sm font-medium text-deepPurple">Name</label>
						<input id="name" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2" />
					</div>
					<div>
						<label class="block text-sm font-medium text-deepPurple">Email</label>
						<input id="email" type="email" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2" />
					</div>
					<div>
						<label class="block text-sm font-medium text-deepPurple">Password</label>
						<input id="password" type="password" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2" />
					</div>
					<button id="signupBtn" class="w-full bg-gold text-deepPurple font-semibold py-2 rounded-md">Create Account</button>
				</form>

				<p class="mt-4 text-center text-sm text-deepPurple">Already have an account? <a href="#" id="showLogin" class="text-gold font-semibold">Login</a></p>

				<form id="loginForm" class="space-y-4 mt-4 hidden">
					<div>
						<label class="block text-sm font-medium text-deepPurple">Email</label>
						<input id="loginEmail" type="email" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2" />
					</div>
					<div>
						<label class="block text-sm font-medium text-deepPurple">Password</label>
						<input id="loginPassword" type="password" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2" />
					</div>
					<button id="loginBtn" class="w-full bg-gold text-deepPurple font-semibold py-2 rounded-md">Login</button>
				</form>
			</div>
		</main>

		<script src="script.js"></script>
	</body>
</html>
